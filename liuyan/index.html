<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端的关键设置，让页面宽度适应设备屏幕，初始缩放比例为1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>留言墙</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* 防止用户长按页面出现默认的选中、复制等菜单 */
            -webkit-touch-callout: none; 
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; 
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            /* 让iframe在移动端有更好的触摸滚动体验 */
            -webkit-overflow-scrolling: touch; 
        }
    </style>
</head>
<body>
    <iframe id="myiframe" src="http://paole.infy.uk/index.php"></iframe>
</body>
</html>
