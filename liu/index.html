

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的状态</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a8a5e6;
            --background-color: #111827;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            --accent-color: #f56565;
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
 
        body {
            background: linear-gradient(135deg, #111827, #1f2937);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: scroll;
            scroll-behavior: smooth;
        }
 
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -3;
        }
 
        .time-axis {
            margin: 2rem 0;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
 
        .time-axis button {
            background: var(--card-bg);
            color: var(--primary-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            letter-spacing: -0.03em;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
        }
 
        .time-axis button:hover {
            transform: translateY(-2px) scale(1.05);
            background: var(--secondary-color);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
 
        .profile-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 800px;
            margin: 1.5rem 0;
            transition: transform 0.3s ease;
        }
 
        .profile-card:hover {
            transform: translateY(-6px);
        }
 
        .profile-card h2 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
 
        .profile-card p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
 
        .skills-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            list-style: none;
        }
 
        .skill-item {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
 
        .skill-item:hover {
            transform: translateY(-3px);
            background: var(--secondary-color);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
        }
 
        .chart-container {
            margin-top: 2rem;
            width: 90%;
            max-width: 800px;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
 
        .chart-container canvas {
            width: 100%;
            height: auto;
        }
 
        @media (max-width: 768px) {
            .profile-card {
                width: 95%;
                padding: 1.5rem;
                margin: 1rem 0;
            }
 
            .profile-card h2 {
                font-size: 1.75rem;
                margin-bottom: 0.75rem;
            }
 
            .profile-card p {
                font-size: 0.9rem;
                margin-bottom: 1rem;
            }
 
            .skill-item {
                font-size: 0.8rem;
                padding: 0.75rem;
            }
        }
 
        /* 加载动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        .animate-fadeInUp {
            animation: fadeInUp 1s ease forwards;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles-js"></div>
 
    <!-- 时间轴导航 -->
    <div class="time-axis">
        <button onclick="showPeriod('current')" class="animate-fadeInUp"><i class="fas fa-clock"></i> 现在</button>
        <button onclick="showPeriod('feb27')" class="animate-fadeInUp"><i class="fas fa-calendar"></i> 2月12日-2月27日</button>
        <button onclick="showPeriod('feb12')" class="animate-fadeInUp"><i class="fas fa-past"></i> 2月5日-2月12日</button>
        <button onclick="showPeriod('before')" class="animate-fadeInUp"><i class="fas fa-history"></i> 更早</button>
    </div>
 
    <!-- 内容容器 -->
    <div id="content"></div>
 
    <!-- 图表容器 -->
    <div class="chart-container" id="chartContainer"></div>
 
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // 初始化粒子效果 
        particlesJS('particles-js', {
            particles: {
                number: { value: 80 },
                color: { value: '#ffffff' },
                opacity: { value: 0.5 },
                size: { value: 3 },
                move: {
                    enable: true,
                    speed: 2 
                }
            }
        });
 
        // 数据定义 
        const periods = {
            current: {
                title: "现在的状态",
                description: "我相信绝对清醒的理智会去压制不该有的情绪",
                skills: [
                    { 
                        category: "精神状态",
                        items: ["理智：80%", "情绪稳定：80%", "心境：60%", "睡眠质量：40%", "乐观：10%", "心痛难受：50%", "烦恼：50%", "感觉至上：0%"] 
                    },
                    { 
                        category: "喜欢你的",
                        items: ["喜欢程度：30~50%", "恋爱脑：20%", "为你吃醋：无", "想你：10~50%", "安全感：无", "控制欲强：无", "为你乱想：无", "想粘着你：无"] 
                    },
                    { 
                        category: "兴趣爱好",
                        items: ["<i class='fas fa-gamepad'></i> 玩游戏", "<i class='fas fa-book'></i> 看书"] 
                    },
                                        {
                        category: "我想说的话",
                        items: ["有时候我会想，如果能回到过去会不会更好？但其实现在的生活已经很美好了。",
                                "虽然有时候会感到迷茫，但我相信自己能找到方向。",
                                "你不喜欢的，我都改，改变成你喜欢的",
                                "我好想快忘记你了，大脑里你出现的次数越来越少了"
                               ]
                                        }
                    
                ]
            },
            feb27: {
                title: "2月12日下午至2月27",
                description: "或许短暂，或许难堪，或许本该这样",
                skills: [
                    { 
                        category: "精神状态",
                        items: ["理智：40%", "情绪稳定：50%", "心境：50%", "睡眠质量：10%", "乐观：10%", "心痛难受：76%", "烦恼：60%", "感觉至上：0%"] 
                    },
                    { 
                        category: "喜欢你的",
                        items: ["喜欢程度：50~70%", "恋爱脑：50%", "为你吃醋：50%", "想你：80%", "安全感：10%", "控制欲强：50%", "为你乱想：80%", "想粘着你：80%"] 
                    },
                    { 
                        category: "兴趣爱好",
                        items: ["<i class='fas fa-gamepad'></i> 玩游戏", "<i class='fas fa-book'></i> 看书", "<i class='fas fa-heart'></i> 想你"] 
                    },
                                        {
                        category: "我想说的话",
                        items: ["谢谢你",
                                "把我叫醒",
                                "我会努力改变的"]
                                        }
                ]
            },
            feb12: {
                title: "2月5日至2月12日中午",
                description: "你不知道，每一次的对视都是怦然心动",
                skills: [
                    { 
                        category: "精神状态",
                        items: ["理智：10%", "情绪稳定：0%", "心境：0%", "睡眠质量：40%", "乐观：100%", "心痛难受：10%", "烦恼：20%", "感觉至上：0%"] 
                    },
                    { 
                        category: "喜欢你的",
                        items: ["喜欢程度：100%", "恋爱脑：100%", "为你吃醋：82%", "想你：100%", "安全感：80%", "控制欲强：100%", "为你乱想：100%", "想粘着你：100%"] 
                    },
                    { 
                        category: "兴趣爱好",
                        items: ["<i class='fas fa-heart'></i> 爱你", "<i class='fas fa-think'></i> 想你"] 
                    },
                                        {
                        category: "我想说的话",
                        items: ["这段时间是我人生中最特别的经历之一。",
                                "抱歉，对不起，这段时间我的无理取闹，以后不会了",
                                "我以后会理智的"]
                                        }
                ]
            },
            before: {
                title: "2025年2月1日之前",
                description: "清喜于时光，安稳于日常",
                skills: [
                    { 
                        category: "精神状态",
                        items: ["理智：50%", "情绪稳定：50%", "心境：43%", "睡眠质量：70%", "乐观：75%", "心痛难受：0%", "烦恼：10%", "感觉至上：100%"] 
                    },
                    { 
                        category: "兴趣爱好",
                        items: ["<i class='fas fa-gamepad'></i> 玩游戏", "<i class='fas fa-bed'></i> 睡觉", "<i class='fas fa-book-open'></i> 看小说"] 
                    }
                ]
            }
        };
 
        // 初始显示当前状态 
        showPeriod('current');
 
        function showPeriod(periodId) {
            const content = document.getElementById('content');
            const chartContainer = document.getElementById('chartContainer');
            
            // 清空内容 
            content.innerHTML = '';
            
            // 获取数据 
            const periodData = periods[periodId];
            
            // 创建卡片 
            const card = document.createElement('div');
            card.className = 'profile-card';
            
            // 添加标题和描述 
            card.innerHTML = `
                <h2>${periodData.title}</h2>
                <p>${periodData.description}</p>
            `;
 
            // 添加技能部分 
            periodData.skills.forEach(skillSet => {
                const skillsDiv = document.createElement('div');
                
                skillsDiv.innerHTML = `
                    <h3>${skillSet.category}</h3>
                    <ul class="skills-list">
                        ${skillSet.items.map(item => `<li class="skill-item">${item}</li>`).join('')}
                    </ul>
                `;
                
                card.appendChild(skillsDiv);
            });
 
            // 添加到内容容器 
            content.appendChild(card);
 
            // 更新图表 
            updateChart(periodData);
 
            // 添加加载动画 
            card.classList.add('animate-fadeInUp');
        }
 
        function updateChart(data) {
            const ctx = document.createElement('canvas').getContext('2d');
            chartContainer.innerHTML = '';
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['理智', '情绪稳定', '心境', '睡眠质量'],
                    datasets: [{
                        label: '状态百分比',
                        data: [
                            parseFloat(data.skills[0].items[0].replace('%', '')),
                            parseFloat(data.skills[0].items[1].replace('%', '')),
                            parseFloat(data.skills[0].items[2].replace('%', '')),
                            parseFloat(data.skills[0].items[3].replace('%', ''))
                        ],
                        backgroundColor: ['#6c5ce7', '#a8a5e6', '#4b6cb7', '#9333ea'],
                        borderColor: '#ffffff',
                        borderWidth: 1,
                        borderRadius: [4,4,4,4],
                        barPercentage: 0.8 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#ffffff'
                            }
                        }
                    },
                    scales:{
                        yAxes:{
                            ticks:{color:'#ffffff'},
                            gridLines:{color:'rgba(255,255,255,0.1)'}
                        },
                        xAxes:{
                            ticks:{color:'#ffffff'},
                            gridLines:{color:'rgba(255,255,255,0.1)'}
                        }
                    },
                    animation:{
                        duration:1500,
                        easing:'easeOutElastic(1, .9)'
                    }
                }
            });
 
            chartContainer.appendChild(ctx.canvas);
        }
    </script>
</body>
</html>
