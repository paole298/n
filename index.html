
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>刘航舒宝宝</title>

</head>

<body>
  <!-- 新增顶栏 -->
  <nav class="top-nav">
    <div class="nav-container">

      <div class="modal-tex">
        <h2 id="greeting"></h2> <!-- 给 h2 元素添加 id 用于后续操作 -->
      </div>
      <button class="open-modal-btn">留言</button>
    </div>
  </nav>
  <div class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn">×</span>
      <div class="modal-text">
        <h2>宝宝</h2>
        <p>网站三个月后自动消失</p>
        <p>我好想你</p>
        <p>算了留着吧</p>
      
        <p>对不起</p>
        <p>我又想你了</p>
        <p>我应该是得病了</p>
        
      </div>
    </div>
  </div>
  <!-- 顶部背景区域 -->
  <div class="top-background">
    <div class="logo"></div>
    <div class="top-text"></div>
    <div class="user-info">
      <div class="user-circle">
        <img src="http://q1.qlogo.cn/g?b=qq&nk=2984465363&s=100" alt="Ki">
        <span>Ki</span>
      </div>

      <div class="user-circle">
        <img src="http://q1.qlogo.cn/g?b=qq&nk=1776255337&s=100" alt="Yi">
        <span>Yi</span>
      </div>
    </div>
  </div>
  <!-- 底部内容区域 -->
  <div class="bottom-content">
    <div class="duration">
      <p>梦开始的时候</p>
      <span id="time-span"></span>
    </div>
    <div class="function-buttons">
      <!-- 原结构保持不变，仅添加data属性 -->
            <div class="function-button" data-link="li/index.html">
        <img src="tupian/li.png" alt="">
        <div class="button-text">
          <p>开心点哦</p>
          <span>算了</span>
        </div>
      </div>
      <div class="function-button" data-link="daka/index.html">
  <img src="tupian/da.png" alt="">
  <div class="button-text">
    <p>日常打卡</p>
    <span>我好想你呀</span>
  </div>
</div>
      <div class="function-button" data-link="yanhua/index.html">
        <img src="tupian/yanhua.png" alt="">
        <div class="button-text">
          <p>烟花</p>
          <span>对不起,又想你了</span>
        </div>
      </div>

      
      <div class="function-button" data-link="shu/index.html">
        <img src="tupian/shu.png" alt="">
        <div class="button-text">
          <p>承诺</p>
          <span>我会永远记得</span>
        </div>
      </div>
      <div class="function-button" data-link="riji/index.html">
        <img src="tupian/ri.png" alt="">
        <div class="button-text">
          <p>网站日志</p>
          <span>我会努力克制的</span>
        </div>
      </div>
      </div>
    </div>

  </div>
  <script src="beijing/script.js"></script>

  <script src="script.js"></script>
