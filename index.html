
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>刘航舒宝宝</title>
</head>

<body>
  <!-- 新增顶栏 -->
  <nav class="top-nav">
    <div class="nav-container">
      <div class="modal-tex">
        <h2 id="greeting"></h2> <!-- 给 h2 元素添加 id 用于后续操作 -->
      </div>
      <button class="open-modal-btn">留言</button>
    </div>
  </nav>
  <div class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn">×</span>
      <div class="modal-text">
        <h2>我永遠会喜歡</h2>
        <p>記憶中的你</p>
        
      </div>
    </div>
  </div>
  <div class="top-background">
    <div class="logo"></div>
    <div class="top-text"></div>
    <div class="user-info">
      <div class="user-circle" id="user-circle-1"> 
        <img src="http://q1.qlogo.cn/g?b=qq&nk=2984465363&s=100" alt="Ki">
        <span>Ki</span>
      </div>
      
      <div class="love-heart"></div> 
      <div class="user-circle" id="user-circle-2"> 
        <img src="http://q1.qlogo.cn/g?b=qq&nk=1776255337&s=100" alt="Yi">
        <span>Yi</span>
      </div>
    </div>
  </div>
  <!-- 底部内容区域 -->
  <div class="bottom-content">
    <div class="duration">
      <p>梦开始的时候</p>
      <span id="time-span"></span>
    </div>
    <div class="function-buttons">
      <!-- 原结构保持不变，仅添加data属性 -->
      
      <div class="function-button" data-link="daka/index.html">
        <img src="tupian/da.png" alt="">
        <div class="button-text">
          <p>日常打卡</p>
          <span>最后的记忆</span>
        </div>
      </div>

      <div class="function-button" data-link="riji/index.html">
        <img src="tupian/ri.png" alt="">
        <div class="button-text">
          <p>网站日志</p>
          <span>随缘写啦</span>
        </div>
      </div>
    </div>
  </div>
  <script src="beijing/script.js"></script>
  <script src="script.js"></script>
  <script>
    // 获取两个头像的 div 元素
    const userCircle1 = document.getElementById('user-circle-1');
    const userCircle2 = document.getElementById('user-circle-2');

    // 为第一个头像添加点击事件监听器
    userCircle1.addEventListener('click', function () {
      // 在这里填写你要跳转的网址
      window.location.href = 'ge/index.html'; 
    });

    // 为第二个头像添加点击事件监听器
    userCircle2.addEventListener('click', function () {
      // 在这里填写你要跳转的网址
      window.location.href = 'ge/liu.html'; 
    });
  </script>
</body>

</html>
